<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Complaint & Suggestion System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>TVL Complaint & Suggestion System</h1>
    <p>Submit your complaint or suggestion below</p>

    <form id="submissionForm">
      
      <label>Type of Submission</label>
      <select id="type" required>
        <option value="">-- Select --</option>
        <option value="Complaint">Complaint</option>
        <option value="Suggestion">Suggestion</option>
      </select>

      <label>Message</label>
      <textarea id="message" required placeholder="Write your concern or suggestion..."></textarea>

      <label>Name (Optional)</label>
      <input type="text" id="name">

      <label>Email (Optional)</label>
      <input type="email" id="email">

      <button type="submit">Submit</button>
    </form>

    <p id="successMsg" class="success"></p>
  </div>
<script>
document.getElementById("submissionForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const data = {
    type: document.getElementById("type").value,
    message: document.getElementById("message").value,
    name: document.getElementById("name").value || "N/A",
    email: document.getElementById("email").value || "N/A"
  };

  if (!data.type || !data.message) {
  alert("Please fill in all required fields.");
  return;
    }

  try {
    
    const res = await fetch("https://script.google.com/macros/s/AKfycbzz5x8bdvrqTVfe5VxNGqLc0P5IoePdWLZI3-gduRg9N11sCXOKazxP6TMNP0MhS0qp/exec", {
      method: "POST",
      body: JSON.stringify(data)
    });

    if (res.ok) {
      document.getElementById("successMsg").innerText =
        "Your response has been submitted successfully.";
      this.reset();
    } else {
      throw new Error("Server error");
    }

  } catch (error) {
    alert("Submission failed. Please check your connection or script URL.");
    console.error(error);
  }
});
</script>
</body>
</html>
